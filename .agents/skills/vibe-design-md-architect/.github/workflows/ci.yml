name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evals:
    name: Run skill evals
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run evals
        run: node scripts/run-evals.mjs

  lint-skill:
    name: Validate SKILL.md frontmatter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SKILL.md has required frontmatter fields
        run: |
          if ! grep -q "^name:" SKILL.md; then
            echo "ERROR: SKILL.md is missing 'name:' in frontmatter" && exit 1
          fi
          if ! grep -q "^description:" SKILL.md; then
            echo "ERROR: SKILL.md is missing 'description:' in frontmatter" && exit 1
          fi
          echo "SKILL.md frontmatter OK"

      - name: Check required files exist
        run: |
          MISSING=0
          for f in SKILL.md README.md CHANGELOG.md CONTRIBUTING.md skills.sh.json package.json; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            fi
          done
          for d in scripts references assets evals; do
            if [ ! -d "$d" ]; then
              echo "MISSING directory: $d"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then exit 1; fi
          echo "All required files and directories present"

      - name: Check all gate scripts exist
        run: |
          MISSING=0
          for s in \
            scripts/intake-session.mjs \
            scripts/standards-search-brief.mjs \
            scripts/bootstrap-design-artifacts.mjs \
            scripts/validate-design-md.mjs \
            scripts/score-design-md.mjs \
            scripts/run-gates.mjs \
            scripts/scan-ui-implementation.mjs \
            scripts/scan-accessibility.mjs \
            scripts/scan-viewport-fit.mjs \
            scripts/amplify-design-md.mjs \
            scripts/impeccable-preflight.sh \
            scripts/run-evals.mjs; do
            if [ ! -f "$s" ]; then
              echo "MISSING script: $s"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then exit 1; fi
          echo "All gate scripts present"

      - name: Check CHANGELOG mentions current version
        run: |
          VERSION=$(node -e "const p=require('./package.json'); process.stdout.write(p.version)")
          MAJOR_MINOR=$(echo $VERSION | sed 's/\.[0-9]*$//')
          if ! grep -q "v${MAJOR_MINOR}" CHANGELOG.md; then
            echo "WARNING: CHANGELOG.md does not mention v${MAJOR_MINOR}"
          else
            echo "CHANGELOG.md mentions current version v${MAJOR_MINOR} ✓"
          fi
