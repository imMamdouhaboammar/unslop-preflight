name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish package to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Package version: $PKG_VERSION"
          echo "Tag version: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version match confirmed ✓"

      - name: Validate SKILL.md frontmatter
        run: |
          grep -q "^name:" SKILL.md || (echo "ERROR: missing name in SKILL.md" && exit 1)
          grep -q "^description:" SKILL.md || (echo "ERROR: missing description in SKILL.md" && exit 1)
          echo "SKILL.md frontmatter OK ✓"

      - name: Check all gate scripts exist
        run: |
          for s in \
            scripts/autopilot.mjs \
            scripts/repair-design-md.mjs \
            scripts/intake-session.mjs \
            scripts/run-gates.mjs \
            scripts/scan-ui-implementation.mjs \
            scripts/scan-accessibility.mjs \
            scripts/run-evals.mjs \
            bin/cli.mjs; do
            [ -f "$s" ] || (echo "MISSING: $s" && exit 1)
          done
          echo "All scripts present ✓"

      - name: Run evals
        run: node scripts/run-evals.mjs

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
