name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Test, build, pack, and eval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build check
        run: npm run build

      - name: Package dry run
        run: npm run pack:dry-run

      - name: Run evals
        run: npm run evals

      - name: Run design gates
        run: npm run gates

  lint-skill:
    name: Validate skill metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check package metadata
        run: node -e "const p=require('./package.json'); if (p.name !== 'unslop-preflight') throw new Error('package name mismatch');"

      - name: Check skill file exists
        run: node -e "const fs=require('node:fs'); for (const f of ['SKILL.md','README.md','CHANGELOG.md','package.json']) { if (!fs.existsSync(f)) throw new Error('missing '+f); }"
